# =============================================================================
# КОНФИГУРАЦИЯ: объединение государственных реестров РФ (комплаенс / AML).
#
# Источники (публичные официальные перечни):
#   1. Минюст — перечень экстремистских организаций (HTML, нумерованный список)
#   2. ФСБ    — единый список террористов (HTML, нумерованный список)
#   3. Росфинмониторинг — перечень террористов и экстремистов (HTML-список)
#   4. Минюст — реестр иностранных агентов (скачиваемый XLSX)
#
# ВАЖНО ПРО СЕТЬ:
#   - Госсайты используют TLS-сертификаты НУЦ РФ, которых нет в системном
#     хранилище → verify_ssl: false (снижает защиту соединения; допустимо
#     только для этих доверенных официальных доменов).
#   - Без «браузерного» User-Agent часть сайтов таймаутит → он задан
#     в loaders/http.py по умолчанию.
#   - Вёрстка госсайтов меняется. При сбое парсинга подправьте у источника
#     container_selector / name_until / extract, не трогая код.
#
# Каждая запись унифицируется в поля:
#   full_name | birth_date | basis | reg_date | category | source
# =============================================================================

sources:
  # --------------------------------------------------------------------------
  # 1. МИНЮСТ — перечень экстремистских организаций
  #    Формат: нумерованный список "N. Название (решение суда ...)."
  # --------------------------------------------------------------------------
  - name: "Минюст: экстремистские организации"
    type: html_list
    path: "https://minjust.gov.ru/ru/documents/7822/"
    options:
      verify_ssl: false
      timeout: 60
      retries: 3
      # Сужаем парсинг до блока контента; если селектор не найден — парсится
      # вся страница (будет предупреждение в логе).
      container_selector: ".news-detail, .content, main, article"
      # Имя = текст до начала судебного решения. Режем по "(<ключевое слово>",
      # а НЕ по первой скобке — иначе «Общественное объединение (движение)...»
      # обрезалось бы до «Общественное объединение».
      basis_markers: ["решени", "пригов", "определени", "постановлени", "апелляц", "кассац", "заочн"]
      min_len: 8
      min_rows: 80              # health-check: меньше — парсер сломан
      constants:
        category: "Экстремистская организация"
        subject_type: "Организация"
    mapping:
      name: full_name           # выделенное имя организации
      raw: basis                # полный текст (название + решение суда)

  # --------------------------------------------------------------------------
  # 2. ФСБ — единый федеральный список террористических организаций
  #    Формат: HTML-ТАБЛИЦА (3 колонки: № п/п | Наименование | Суд/дата).
  #    Заголовок — в первой строке таблицы, поэтому header: 0.
  #    Имена колонок на госсайте длинные/с переносами → переименовываем
  #    позиционно через columns (надёжнее текстового совпадения).
  # --------------------------------------------------------------------------
  - name: "ФСБ: террористические организации"
    type: web
    path: "http://www.fsb.ru/fsb/npd/terror.htm"
    options:
      verify_ssl: false
      timeout: 90               # сайт ФСБ отвечает медленно
      retries: 4
      retry_backoff: 3
      encoding: "utf-8"         # страница в UTF-8 (несмотря на «древний» вид)
      table_index: 0            # первая таблица — со списком организаций
      header: 0                 # шапка в первой строке
      columns: [num, full_name, basis]  # позиционные имена колонок
      min_rows: 40              # health-check: меньше — парсер сломан
      constants:
        category: "Террористическая организация"
        subject_type: "Организация"
    # mapping не нужен: columns уже дал целевые имена (full_name, basis).

  # --------------------------------------------------------------------------
  # 3. РОСФИНМОНИТОРИНГ — перечень террористов и экстремистов
  #    Формат: 4 раздела (Нацчасть/Международная × Организации/Физлица),
  #    КАЖДАЯ запись — отдельный <li> вида "N. НАИМЕНОВАНИЕ/ФИО, дата, ИНН...".
  #    item_selector: li заставляет парсить ВСЕ элементы списка (≈22 700:
  #    и организации, И физические лица), а не один блок страницы.
  # --------------------------------------------------------------------------
  - name: "Росфинмониторинг: террористы и экстремисты"
    type: html_list
    path: "https://www.fedsfm.ru/documents/terrorists-catalog-portal-act"
    options:
      verify_ssl: false
      timeout: 60
      retries: 3
      item_selector: "li"       # каждая запись — отдельный <li>
      name_until: ","           # имя = текст до запятой (далее — дата рождения/ИНН)
      min_len: 8
      extract:
        # Дата рождения — ТОЛЬКО в контексте «г.р.» (иначе у организаций
        # ошибочно подхватывалась бы дата решения/регистрации).
        birth_date: "(\\d{2}\\.\\d{2}\\.\\d{4})\\s*г\\.?\\s*р"
        inn: "ИНН:\\s*(\\d{10,12})"                # ИНН (у организаций)
      min_rows: 10000          # health-check: меньше — парсер сломан
      constants:
        category: "Террорист/экстремист (перечень РФМ)"
        subject_type: "Физическое/юридическое лицо"
    mapping:
      name: full_name
      birth_date: birth_date
      inn: inn
      raw: basis

  # --------------------------------------------------------------------------
  # 4. МИНЮСТ — реестр иностранных агентов (JSON API виджета reestrs.minjust)
  #    Кнопка «Загрузить реестр» — JS, данные виджет берёт из REST API на
  #    поддомене reestrs.minjust.gov.ru. Это надёжнее «случайного» XLSX:
  #    забираем ВСЕ ~1200 записей постранично (POST offset/limit).
  #
  #    id реестра «Реестр иностранных агентов» можно получить так:
  #      POST https://reestrs.minjust.gov.ru/rest/registry/all
  #           body: {"offset":0,"limit":100,"search":"","facets":{},"sort":[]}
  #      и найти в values запись с title="Реестр иностранных агентов".
  #    Если Минюст сменит id — обновите его в URL ниже.
  #
  #    Поля ответа — технические (field_N_s/_dt). Их расшифровка получена из
  #    GET /rest/registry/{id}/info и зашита в mapping ниже.
  # --------------------------------------------------------------------------
  - name: "Минюст: иностранные агенты"
    type: api
    path: "https://reestrs.minjust.gov.ru/rest/registry/39b95df9-9a68-6b6d-e1e3-e6388507067e/values"
    options:
      verify_ssl: false
      timeout: 60
      retries: 3
      method: POST
      headers:
        Accept: "application/json"
        Content-Type: "application/json;charset=UTF-8"
        Referer: "https://minjust.gov.ru/"
      body:
        search: ""
        facets: {}
        sort: []
      records_path: "values"
      paginate:
        offset_field: "offset"
        limit_field: "limit"
        page_size: 200
        total_path: "size"
      min_rows: 500            # health-check: меньше — парсер сломан
      constants:
        category: "Иностранный агент"
    # Расшифровка технических полей реестра (из /info):
    mapping:
      "field_2_s": full_name      # Полное наименование / ФИО
      "field_3_s": basis          # Основания для включения
      "field_4_dt": reg_date      # Дата включения в реестр
      "field_5_dt": exclusion_date  # Дата ИСКЛЮЧЕНИЯ из реестра (при наличии)
      "field_7_s": subject_type   # Тип иностранного агента
      "field_9_s": inn            # ИНН
      "field_12_dt": birth_date   # Дата рождения
      "field_14_s": address       # Адрес (место нахождения)

  # --------------------------------------------------------------------------
  # 5. МИНЮСТ — перечень иностранных и международных организаций, деятельность
  #    которых признана НЕЖЕЛАТЕЛЬНОЙ на территории РФ (JSON-API reestrs.minjust).
  #    Реестр id c2d1692e-... ; ~361 организация. Поля — из /info.
  # --------------------------------------------------------------------------
  - name: "Минюст: нежелательные организации"
    type: api
    path: "https://reestrs.minjust.gov.ru/rest/registry/c2d1692e-a9f6-5a79-13ee-5da5b42980df/values"
    options:
      verify_ssl: false
      timeout: 60
      retries: 3
      method: POST
      headers:
        Accept: "application/json"
        Content-Type: "application/json;charset=UTF-8"
        Referer: "https://minjust.gov.ru/"
      body:
        search: ""
        facets: {}
        sort: []
      records_path: "values"
      paginate:
        offset_field: "offset"
        limit_field: "limit"
        page_size: 200
        total_path: "size"
      min_rows: 100             # health-check: меньше — парсер сломан
      constants:
        category: "Нежелательная организация"
        subject_type: "Организация"
    mapping:
      "field_5_s": full_name      # Наименование организации
      "field_2_dt": reg_date      # Дата включения в перечень
      "field_7_dt": exclusion_date  # Дата ИСКЛЮЧЕНИЯ из перечня (при наличии)
      "field_3_s": basis          # Номер распоряжения Минюста

# --------------------------------------------------------- Правила нормализации
normalization:
  date_fields: [birth_date, reg_date, exclusion_date]  # даты -> YYYY-MM-DD
  phone_fields: []                      # телефонов в этих реестрах нет
  default_phone_region: "RU"
  id_fields: [inn]                      # ИНН -> только цифры
  text_fields: [full_name, basis, address]  # trim + схлоп пробелов
  uppercase_fields: []

# -------------------------------------------------------------- Объединение
merge:
  # Дубликаты — по имени + дате рождения: одно лицо/организация из разных
  # перечней схлопывается в одну запись (источник остаётся от первой).
  deduplicate_on: [full_name, birth_date]
  keep: first
  # Сущность из нескольких реестров -> одна строка, но в category перечисляются
  # ВСЕ её категории (напр. «Террорист/экстремист (перечень РФМ); Иностранный агент»).
  combine_columns: [category]

# ------------------------------------------------------- Проверка качества
quality:
  required_fields: [full_name]
  drop_if_empty: [full_name]            # запись без имени бессмысленна
  # Если заполнена дата исключения из реестра — строку удаляем.
  drop_if_filled: [exclusion_date]
  # Удаляем строки-заглушки об исключённых организациях.
  drop_if_matches:
    full_name: "исключен[ао]\\b"
  # ПРИМЕЧАНИЕ: физлица-террористы/экстремисты СОХРАНЯЮТСЯ в БД (для отдельной
  # таблицы физлиц). Из скрининга сайтов они исключаются на стороне сканера
  # (секция matching.drop ниже), чтобы не давать шум по однофамильцам.
  patterns: {}
  # Глобальный health-check: меньше записей в итоге — экспорт отменяется,
  # прежние данные в БД не перезаписываются (вероятно, отвалился источник).
  min_total_rows: 15000

# ------------------------------------------------------------------ Экспорт (БД)
# По требованию: выгрузка ТОЛЬКО в базу данных (PostgreSQL), без CSV/XLSX.
# Создаются три таблицы: физлица, организации и совмещённая.
database:
  url: "postgresql+psycopg2://localhost/registry"
  table_all: "registry_all"          # совмещённый список
  table_persons: "registry_persons"  # только физлица
  table_orgs: "registry_orgs"        # только организации
  directory: "output"                # сюда кладётся только DISCLAIMER.txt

# =============================================================================
# СКРИНЕР САЙТОВ (используется scan.py). Перечень берётся из БД (выше).
# =============================================================================
matching:
  # Перечень читается из БД (PostgreSQL), таблица — совмещённый список.
  registry_db:
    url: "postgresql+psycopg2://localhost/registry"
    table: "registry_all"
    name_column: "naimenovanie_fio"
    category_column: "kategoriya"
  min_pattern_length: 6       # короче — отбрасываем (меньше ложных срабатываний)

  # Физлица-террористы/экстремисты в скрининге дают лишь ложные тёзки —
  # исключаем (в БД они сохранены, отдельная таблица физлиц).
  drop:
    - kind: person
      category_contains: ["террорист", "экстремист"]

  # Этап 4 (search.md): нечёткий поиск (опечатки/варианты). Для полного обхода
  # держим выключенным (дорого); включается для точечных проверок (scan_demo).
  fuzzy:
    enabled: false
    threshold: 90
    min_len: 8
    max_words: 5

  # Алиасы: одна запрещённая сущность в разных написаниях (латиница/кириллица).
  aliases:
    - entity: "Meta Platforms Inc. (Instagram/Facebook/Threads) — экстремистская, запрещена в РФ"
      category: "Экстремистская организация (Meta)"
      confidence: "высокая"
      variants: ["Instagram","Инстаграм","Инстаграмм","instagram.com","Facebook","Фейсбук","Фэйсбук","facebook.com","Threads","Тредс","Meta Platforms","Мета Платформс"]
    - entity: "Twitter / X — заблокирована в РФ (проверить уместность ссылки)"
      category: "Соцсеть, ограниченная в РФ (на проверку)"
      confidence: "средняя"
      variants: ["Twitter","Твиттер","twitter.com","x.com"]
    - entity: "LinkedIn — заблокирована в РФ (проверить уместность ссылки)"
      category: "Соцсеть, ограниченная в РФ (на проверку)"
      confidence: "средняя"
      variants: ["LinkedIn","Линкедин","linkedin.com"]

scan:
  mode: structure             # structure — вся структура СПбПУ; single — один хост
  # Авторитетный список целевых доменов от руководителя (217 шт.). Имеет
  # приоритет; если файла нет — авто-обнаружение по structure_urls.
  hosts_file: "домены.xls"
  structure_urls: ["https://www.spbstu.ru/structure/"]  # запасной способ
  domain_suffix: "spbstu.ru"
  extra_hosts: []
  use_sitemaps: true
  crawl_fallback: true
  max_pages_total: 0          # 0 = обойти ВСЁ (~73 000 страниц, многочасовой batch)
  max_pages_per_host: 0
  max_depth: 2
  delay_seconds: 0.3
  respect_robots: true
  resume: true
  flush_every: 500
  verify_ssl: false
  timeout: 25
  retries: 2
  user_agent: "SPbPU-Compliance-Scanner/1.0 (+internal registry screening)"
  start_url: "https://www.spbstu.ru/"   # для режима single
  same_host_only: true

report:
  db_table: "scan_findings"             # таблица БД с находками скрининга
  state_file: "output/scan_state.txt"   # служебный файл прогресса (для resume)

# ------------------------------------------------------------------ Логи (общие)
logging:
  directory: "logs"
  level: "INFO"
