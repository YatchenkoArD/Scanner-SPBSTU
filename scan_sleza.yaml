# =============================================================================
# Точечная проверка ОДНОГО сайта (sleza.media) ТОЛЬКО на физлиц —
# террористов и экстремистов из перечня. Запуск:
#   python scan.py --config scan_sleza.yaml
# =============================================================================

matching:
  registry_csv: "output/registry_merged.csv"
  name_column_index: 1
  category_column_index: 2
  min_pattern_length: 6
  # ОСТАВИТЬ ТОЛЬКО физлиц-террористов/экстремистов (обратное основному конфигу).
  keep_only:
    - kind: person
      category_contains: ["террорист", "экстремист"]
  # Алиасы здесь не нужны — ищем именно людей из перечня.

scan:
  mode: structure
  structure_urls: ["https://sleza.media/"]
  domain_suffix: "sleza.media"
  use_sitemaps: true
  crawl_fallback: true
  max_pages_total: 0          # весь сайт (~2720 страниц)
  max_pages_per_host: 0
  max_depth: 2
  delay_seconds: 0.2
  respect_robots: true
  resume: false
  flush_every: 300
  verify_ssl: false
  timeout: 25
  retries: 2
  user_agent: "Compliance-Scanner/1.0 (registry screening)"

report:
  directory: "output"
  basename: "scan_sleza"
  state_file: "output/scan_sleza_state.txt"

logging:
  directory: "logs"
  level: "INFO"
