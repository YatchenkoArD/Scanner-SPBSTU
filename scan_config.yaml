# =============================================================================
# Конфигурация СКРИНЕРА: поиск вхождений лиц/организаций из перечня на сайтах.
# Запуск:  python scan.py --config scan_config.yaml
# =============================================================================

# --------------------------------------------------------- Откуда берём перечень
matching:
  # Перечень читается из БД (PostgreSQL), таблица — совмещённый список.
  registry_db:
    url: "postgresql+psycopg2://localhost/registry"
    table: "registry_all"
    name_column: "naimenovanie_fio"
    category_column: "kategoriya"
  min_pattern_length: 6       # короче — отбрасываем (меньше ложных срабатываний)

  # ФИЛЬТР ШАБЛОНОВ. Физлица из перечня террористов/экстремистов дают почти
  # только ложные срабатывания по однофамильцам — исключаем их из массового
  # скрининга (ОРГАНИЗАЦИИ-террористы/экстремисты остаются). В самой БД они
  # сохранены (отдельная таблица физлиц); отсев — только на стороне сканера.
  drop:
    - kind: person
      category_contains: ["террорист", "экстремист"]

  # Этап 4 (search.md): нечёткий поиск (опечатки/варианты написания).
  # Для полного обхода (десятки тысяч страниц) держим выключенным — дорого;
  # включайте для точечных проверок (см. scan_demo.yaml).
  fuzzy:
    enabled: false
    threshold: 90
    min_len: 8
    max_words: 5

  # АЛИАСЫ: одна запрещённая сущность пишется по-разному (латиница/кириллица,
  # сокращения). В перечне Meta указана длинной фразой «…соцсетей Facebook и
  # Instagram», которой на сайтах не бывает — поэтому ищем по реальным
  # написаниям. variants ищутся как ОТДЕЛЬНЫЕ слова (с учётом границ).
  aliases:
    # --- Meta: признана экстремистской и запрещена в РФ (Instagram/Facebook/Threads) ---
    - entity: "Meta Platforms Inc. (Instagram/Facebook/Threads) — экстремистская, запрещена в РФ"
      category: "Экстремистская организация (Meta)"
      confidence: "высокая"
      variants:
        - "Instagram"
        - "Инстаграм"
        - "Инстаграмм"
        - "instagram.com"
        - "Facebook"
        - "Фейсбук"
        - "Фэйсбук"
        - "facebook.com"
        - "Threads"
        - "Тредс"
        - "Meta Platforms"
        - "Мета Платформс"

    # --- Соцсети/сервисы, заблокированные или ограниченные в РФ (на проверку) ---
    - entity: "Twitter / X — заблокирована в РФ (проверить уместность ссылки)"
      category: "Соцсеть, ограниченная в РФ (на проверку)"
      confidence: "средняя"
      variants:
        - "Twitter"
        - "Твиттер"
        - "twitter.com"
        - "x.com"
    - entity: "LinkedIn — заблокирована в РФ (проверить уместность ссылки)"
      category: "Соцсеть, ограниченная в РФ (на проверку)"
      confidence: "средняя"
      variants:
        - "LinkedIn"
        - "Линкедин"
        - "linkedin.com"

    # ➕ Сюда compliance-служба может добавлять нежелательные организации и СМИ
    #    с их написаниями на латинице и кириллице (по аналогии).

# ----------------------------------------------------------------- Что обходим
scan:
  # single    — один хост (start_url, BFS по ссылкам).
  # structure — ВСЯ структура СПбПУ: институты, высшие школы, лаборатории,
  #             центры, кафедры, подразделения, сервисы и их поддомены.
  mode: structure

  # Откуда берём список подразделений и их поддоменов.
  structure_urls:
    - "https://www.spbstu.ru/structure/"
  domain_suffix: "spbstu.ru"  # обходим только этот домен и его поддомены
  extra_hosts: []             # доп. хосты вручную (если не попали в структуру)

  use_sitemaps: true          # перечислять страницы через sitemap.xml (вежливо/полно)
  crawl_fallback: true        # хосты без sitemap — обходить BFS по ссылкам

  # ЛИМИТЫ. 0 = без предела (= обойти ВСЁ).
  #   ⚠️  В структуре СПбПУ ~73 000 страниц. Полный обход (0/0) — это
  #   многочасовой batch и заметная нагрузка на серверы вуза. Запускайте его
  #   фоново/по расписанию; resume:true делает прерывание безопасным
  #   (повторный запуск продолжит с места остановки).
  #   Для быстрой проверки поставьте, напр., max_pages_total: 250.
  max_pages_total: 0          # глобальный предел страниц (0 = все)
  max_pages_per_host: 0       # предел на один поддомен (0 = все)
  max_depth: 2                # глубина BFS для хостов без sitemap

  delay_seconds: 0.3          # пауза между запросами (вежливость к серверам)
  respect_robots: true        # соблюдать robots.txt каждого хоста
  resume: true                # пропускать уже просканированные URL (возобновление)
  flush_every: 500            # как часто сбрасывать отчёт/состояние на диск

  verify_ssl: false
  timeout: 25
  retries: 2
  user_agent: "SPbPU-Compliance-Scanner/1.0 (+internal registry screening)"

  # Используется только в режиме single:
  start_url: "https://www.spbstu.ru/"
  same_host_only: true

# ------------------------------------------------------------------ Отчёт
report:
  directory: "output"
  basename: "scan_spbstu"
  state_file: "output/scan_state.txt"   # для возобновления (resume)

# ------------------------------------------------------------------ Логи
logging:
  directory: "logs"
  level: "INFO"
